<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1181 843" width="1181" height="843" role="img" aria-label="GitHub Foundations certification badge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef0f6"/>
    </linearGradient>
  </defs>

  <rect width="1181" height="843" fill="url(#bg)"/>
  <g stroke="#131829" stroke-opacity=".05" stroke-width="1">
    <path d="M0 200 h1181"/><path d="M0 640 h1181"/>
  </g>

  <g transform="translate(590 350)">
    <circle r="150" fill="none" stroke="#131829" stroke-opacity=".1" stroke-width="2"/>
    <circle r="118" fill="#ffffff" stroke="#545f80" stroke-width="6"/>
    <!-- branch emblem -->
    <g stroke="#8f5b00" stroke-width="7" fill="none" stroke-linecap="round">
      <path d="M-40 -56 v112"/>
      <path d="M-40 0 h44 a26 26 0 0 0 26 -26 v-22"/>
    </g>
    <g fill="#545f80">
      <circle cx="-40" cy="-62" r="16"/>
      <circle cx="-40" cy="62" r="16"/>
      <circle cx="30" cy="-56" r="16"/>
    </g>
  </g>

  <g font-family="Barlow, Arial, sans-serif" text-anchor="middle">
    <text x="590" y="592" fill="#131829" font-size="52" font-weight="600">GitHub</text>
    <text x="590" y="646" fill="#8f5b00" font-size="34" font-weight="600">Foundations</text>
    <text x="590" y="712" fill="#59617a" font-size="28">Aymen Hannani</text>
  </g>
</svg>
