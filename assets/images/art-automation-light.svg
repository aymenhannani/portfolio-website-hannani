<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Abstract automation: a script window feeding a repeating processing loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0f6"/>
      <stop offset="1" stop-color="#e6e9f3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- script window -->
  <g>
    <rect x="90" y="120" width="470" height="360" rx="16" fill="#ffffff" stroke="#131829" stroke-opacity=".1"/>
    <path d="M90 136 a16 16 0 0 1 16 -16 h438 a16 16 0 0 1 16 16 v28 h-470 z" fill="#131829" fill-opacity=".05"/>
    <g fill="#131829" fill-opacity=".25">
      <circle cx="118" cy="142" r="6"/><circle cx="140" cy="142" r="6"/><circle cx="162" cy="142" r="6"/>
    </g>
    <g fill="#6b769c" fill-opacity=".5">
      <rect x="118" y="200" width="70" height="8" rx="4"/>
      <rect x="200" y="200" width="150" height="8" rx="4"/>
      <rect x="140" y="230" width="110" height="8" rx="4"/>
      <rect x="140" y="260" width="200" height="8" rx="4"/>
      <rect x="118" y="320" width="60" height="8" rx="4"/>
      <rect x="140" y="350" width="170" height="8" rx="4"/>
      <rect x="140" y="380" width="120" height="8" rx="4"/>
      <rect x="118" y="420" width="90" height="8" rx="4"/>
    </g>
    <g fill="#0b7a70" fill-opacity=".9">
      <rect x="262" y="230" width="86" height="8" rx="4"/>
      <rect x="360" y="260" width="64" height="8" rx="4"/>
      <rect x="322" y="350" width="76" height="8" rx="4"/>
    </g>
  </g>

  <!-- loop arrows -->
  <g fill="none" stroke="#545f80" stroke-opacity=".6" stroke-width="4" stroke-linecap="round">
    <path d="M700 200 a 140 140 0 1 1 -60 26"/>
  </g>
  <path d="M700 200 l -34 -22 l 4 44 z" fill="#545f80" fill-opacity=".8"/>

  <!-- gear -->
  <g transform="translate(800 300)">
    <circle r="86" fill="#ffffff" stroke="#0b7a70" stroke-opacity=".7" stroke-width="3"/>
    <circle r="34" fill="none" stroke="#0b7a70" stroke-opacity=".85" stroke-width="3"/>
    <g fill="#0b7a70" fill-opacity=".8">
      <rect x="-9" y="-116" width="18" height="26" rx="4"/>
      <rect x="-9" y="90" width="18" height="26" rx="4"/>
      <rect x="-116" y="-9" width="26" height="18" rx="4"/>
      <rect x="90" y="-9" width="26" height="18" rx="4"/>
      <rect x="-9" y="-116" width="18" height="26" rx="4" transform="rotate(45)"/>
      <rect x="-9" y="90" width="18" height="26" rx="4" transform="rotate(45)"/>
      <rect x="-116" y="-9" width="26" height="18" rx="4" transform="rotate(45)"/>
      <rect x="90" y="-9" width="26" height="18" rx="4" transform="rotate(45)"/>
    </g>
  </g>

  <!-- output rows -->
  <g fill="#545f80" fill-opacity=".35">
    <rect x="960" y="230" width="150" height="12" rx="6"/>
    <rect x="960" y="266" width="120" height="12" rx="6"/>
    <rect x="960" y="302" width="164" height="12" rx="6"/>
    <rect x="960" y="338" width="98" height="12" rx="6"/>
  </g>
</svg>
