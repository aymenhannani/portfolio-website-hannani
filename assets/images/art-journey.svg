<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img" aria-label="A vertical path of milestones rising from engineering studies through business analysis, business intelligence and data platform ownership">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1426"/>
      <stop offset="1" stop-color="#141d35"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#4d94f0" stop-opacity=".18"/>
      <stop offset=".55" stop-color="#4d94f0" stop-opacity=".55"/>
      <stop offset="1" stop-color="#8fb4e8" stop-opacity=".85"/>
    </linearGradient>
    <radialGradient id="topGlow" cx=".5" cy=".16" r=".42">
      <stop offset="0" stop-color="#8fb4e8" stop-opacity=".16"/>
      <stop offset="1" stop-color="#8fb4e8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#topGlow)"/>

  <!-- faint measurement grid: the "engineering" texture -->
  <g stroke="#ffffff" stroke-opacity=".04" stroke-width="1">
    <path d="M0 200 h800"/><path d="M0 400 h800"/><path d="M0 600 h800"/><path d="M0 800 h800"/>
    <path d="M200 0 v1000"/><path d="M400 0 v1000"/><path d="M600 0 v1000"/>
  </g>

  <!-- the path: a rising route, not a decorative flourish -->
  <path d="M250 900 C 250 810, 470 800, 470 710 C 470 620, 250 610, 250 520
           C 250 430, 530 420, 530 330 C 530 250, 400 236, 400 170"
        fill="none" stroke="url(#rail)" stroke-width="4" stroke-linecap="round"/>

  <!-- milestone nodes, earliest at the bottom -->
  <g>
    <!-- 2014-2018 : engineering school -->
    <circle cx="250" cy="900" r="26" fill="#16203a" stroke="#4d94f0" stroke-opacity=".55" stroke-width="3"/>
    <path d="M236 898 l14 -9 l14 9 l-14 8 z" fill="#8fb4e8" fill-opacity=".85"/>
    <path d="M241 904 v9 a 9 6 0 0 0 18 0 v-9" fill="none" stroke="#8fb4e8" stroke-opacity=".7" stroke-width="2.5"/>

    <!-- analyst : magnifier over a bar -->
    <circle cx="470" cy="710" r="26" fill="#16203a" stroke="#4d94f0" stroke-opacity=".55" stroke-width="3"/>
    <g fill="#8fb4e8" fill-opacity=".8">
      <rect x="458" y="712" width="7" height="12" rx="2"/>
      <rect x="468" y="704" width="7" height="20" rx="2"/>
      <rect x="478" y="698" width="7" height="26" rx="2"/>
    </g>

    <!-- BI : trend line -->
    <circle cx="250" cy="520" r="26" fill="#16203a" stroke="#4d94f0" stroke-opacity=".55" stroke-width="3"/>
    <path d="M236 530 l12 -12 l9 6 l17 -18" fill="none" stroke="#8fb4e8" stroke-opacity=".9" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- platform : stacked layers -->
    <circle cx="530" cy="330" r="26" fill="#16203a" stroke="#4d94f0" stroke-opacity=".55" stroke-width="3"/>
    <g fill="none" stroke="#8fb4e8" stroke-opacity=".85" stroke-width="2.5">
      <path d="M514 324 l16 -8 l16 8 l-16 8 z"/>
      <path d="M514 336 l16 8 l16 -8"/>
    </g>

    <!-- current : product ownership — the only lit node -->
    <circle cx="400" cy="170" r="34" fill="#1b2540" stroke="#f4623a" stroke-width="3"/>
    <circle cx="400" cy="170" r="46" fill="none" stroke="#f4623a" stroke-opacity=".22" stroke-width="2"/>
    <g fill="#f4623a">
      <circle cx="400" cy="156" r="5"/>
      <circle cx="386" cy="180" r="5"/>
      <circle cx="414" cy="180" r="5"/>
    </g>
    <g stroke="#f4623a" stroke-width="2.5" stroke-opacity=".8">
      <path d="M400 161 L 388 176"/>
      <path d="M400 161 L 412 176"/>
      <path d="M391 180 h18"/>
    </g>
  </g>

  <!-- progress ticks along the rail -->
  <g fill="#8fb4e8" fill-opacity=".35">
    <circle cx="340" cy="838" r="4"/>
    <circle cx="378" cy="640" r="4"/>
    <circle cx="344" cy="452" r="4"/>
    <circle cx="472" cy="256" r="4"/>
  </g>
</svg>
