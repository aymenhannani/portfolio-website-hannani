<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Abstract migration: a legacy reporting panel switched off as data flows into a new validated platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0f6"/>
      <stop offset="1" stop-color="#e6e9f3"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#545f80" stop-opacity=".2"/>
      <stop offset=".55" stop-color="#545f80" stop-opacity=".8"/>
      <stop offset="1" stop-color="#0b7a70" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="glow" cx=".74" cy=".46" r=".52">
      <stop offset="0" stop-color="#0b7a70" stop-opacity=".14"/>
      <stop offset="1" stop-color="#0b7a70" stop-opacity="0"/>
    </radialGradient>
    <marker id="qa" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0b7a70" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- legacy reporting panel, dimmed and being retired -->
  <g opacity=".7">
    <rect x="110" y="176" width="300" height="248" rx="18" fill="#545f80" fill-opacity=".05" stroke="#545f80" stroke-opacity=".4" stroke-width="2"/>
    <g fill="#545f80" fill-opacity=".34">
      <rect x="140" y="212" width="150" height="16" rx="6"/>
      <rect x="140" y="248" width="240" height="10" rx="5"/>
      <rect x="140" y="270" width="210" height="10" rx="5"/>
      <rect x="140" y="322" width="60" height="66" rx="6"/>
      <rect x="212" y="300" width="60" height="88" rx="6"/>
      <rect x="284" y="338" width="60" height="50" rx="6"/>
    </g>
  </g>
  <!-- power-off mark: this tool is switched off -->
  <g transform="translate(360 200)">
    <circle r="26" fill="#eef0f6" stroke="#b03a29" stroke-opacity=".9" stroke-width="2.4"/>
    <line x1="0" y1="-15" x2="0" y2="2" stroke="#b03a29" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M-12 -6 A16 16 0 1 0 12 -6" fill="none" stroke="#b03a29" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- migration flow, slate hardening into teal -->
  <path d="M430 320 C 560 320, 600 300, 760 300" fill="none" stroke="url(#flow)" stroke-width="9" stroke-linecap="round" marker-end="url(#qa)"/>
  <!-- parity gate node on the flow -->
  <g transform="translate(595 300)">
    <circle r="30" fill="#ffffff" stroke="#0b7a70" stroke-width="2.4"/>
    <path d="M-12 1 L-3 10 L13 -9" fill="none" stroke="#0b7a70" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- new validated platform panel -->
  <rect x="770" y="150" width="330" height="300" rx="22" fill="#ffffff" stroke="#0b7a70" stroke-opacity=".5" stroke-width="2"/>
  <rect x="800" y="182" width="120" height="14" rx="7" fill="#0b7a70" fill-opacity=".85"/>
  <g fill="#0b7a70">
    <rect x="800" y="232" width="122" height="80" rx="10" fill-opacity=".1"/>
    <rect x="948" y="232" width="122" height="80" rx="10" fill-opacity=".1"/>
    <rect x="800" y="332" width="122" height="80" rx="10" fill-opacity=".1"/>
    <rect x="948" y="332" width="122" height="80" rx="10" fill-opacity=".1"/>
  </g>
  <g fill="#0b7a70">
    <rect x="818" y="262" width="60" height="8" rx="4"/>
    <rect x="966" y="262" width="60" height="8" rx="4"/>
    <rect x="818" y="362" width="60" height="8" rx="4"/>
    <rect x="966" y="362" width="60" height="8" rx="4"/>
  </g>

  <!-- ambient particles -->
  <g fill="#545f80" fill-opacity=".45">
    <circle cx="520" cy="150" r="3"/><circle cx="690" cy="430" r="3"/><circle cx="470" cy="470" r="2.5"/><circle cx="1120" cy="120" r="2.5"/>
  </g>
</svg>
